<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T Sports HD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden;
        }
        
        video { 
            width: 100vw; 
            height: 100vh; 
            object-fit: contain; 
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        #credit {
            position: fixed;
            bottom: 6px;
            right: 10px;
            color: rgba(255,255,255,0.25);
            font-family: Arial;
            font-size: 9px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="video" playsinline webkit-playsinline autoplay></video>
    <div id="credit">S.B Shehab</div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    
    <script>
        const _k = 'aHR0cDovLzEwMy4xMy4xOTMuMTk0OjgwODIvVC1TUE9SVFMtSEQvdmlkZW8ubTN1OD90b2tlbj1SdXNyaVJNLUw3M0czMw==';
        const STREAM_URL = atob(_k);

        const video = document.getElementById('video');
        let hls = null;
        let soundUnlocked = false;

        // ========== ফুলস্ক্রিন ==========
        function goFullscreen() {
            const el = document.documentElement;
            try {
                if (el.requestFullscreen) {
                    el.requestFullscreen();
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                } else if (el.msRequestFullscreen) {
                    el.msRequestFullscreen();
                }
            } catch(e) {}
            
            try {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape');
                }
            } catch(e) {}
            
            // ফুলস্ক্রিন বা ক্লিকের পর সাউন্ড আনমিউট
            unlockSound();
        }

        // ========== সাউন্ড আনলক ==========
        function unlockSound() {
            if (!soundUnlocked) {
                video.muted = false;
                video.volume = 1.0;
                soundUnlocked = true;
                console.log('🔊 Sound Unlocked');
            }
        }

        // ========== HLS Player ==========
        function setupPlayer() {
            if (typeof Hls === 'undefined') {
                setTimeout(setupPlayer, 1000);
                return;
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    lowLatencyMode: false,
                    enableWorker: true,
                    maxBufferLength: 30,
                    manifestLoadingTimeOut: 20000,
                    manifestLoadingMaxRetry: 5,
                    levelLoadingTimeOut: 20000,
                    fragLoadingTimeOut: 20000,
                    fragLoadingMaxRetry: 5,
                    // অডিও ট্র্যাক অটো সিলেক্ট
                    autoStartLoad: true,
                    startLevel: -1
                });

                hls.loadSource(STREAM_URL);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    // প্রথমে muted দিয়ে প্লে শুরু
                    video.muted = true;
                    video.play().then(() => {
                        goFullscreen();
                        // ৫০০ মিলিসেকেন্ড পর আনমিউট
                        setTimeout(unlockSound, 500);
                    }).catch(() => {
                        goFullscreen();
                    });
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                tryDirectPlay();
                                break;
                        }
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = STREAM_URL;
                video.muted = true;
                video.addEventListener('loadedmetadata', () => {
                    video.play().then(() => {
                        goFullscreen();
                        setTimeout(unlockSound, 500);
                    }).catch(() => {});
                });
            } else {
                tryDirectPlay();
            }
        }

        function tryDirectPlay() {
            video.src = STREAM_URL;
            video.muted = true;
            video.load();
            video.play().then(() => {
                goFullscreen();
                setTimeout(unlockSound, 500);
            }).catch(() => {});
        }

        // ========== Start ==========
        setTimeout(setupPlayer, 1000);

        // ক্লিক/টাচ = ফুলস্ক্রিন + সাউন্ড
        document.addEventListener('click', () => {
            goFullscreen();
            unlockSound();
        });
        
        document.addEventListener('touchstart', () => {
            goFullscreen();
            unlockSound();
        });
        
        document.addEventListener('keydown', () => {
            goFullscreen();
            unlockSound();
        });

        console.log('%c📺 T Sports HD %c| %cS.B Shehab %c| Sound Ready',
            'color:#e63946;font-weight:bold;',
            'color:#fff;',
            'color:#f0c040;',
            'color:#888;');
    </script>
</body>
</html>
