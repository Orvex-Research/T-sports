
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T Sports HD Player</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; }
        video { width: 100vw; height: 100vh; object-fit: contain; }
    </style>
</head>
<body>

    <video id="video" playsinline webkit-playsinline autoplay muted></video>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const STREAM_URL = 'http://103.13.193.194:8082/T-SPORTS-HD/video.m3u8?token=RusriRM-L73G33';
        const video = document.getElementById('video');

        // এই ফাংশনটি ব্রাউজারের নিয়ম মেনে অটোমেটিক চেষ্টা করবে
        async function attemptAutoExperience() {
            try {
                // সাউন্ড আনমিউট করার চেষ্টা (ব্রাউজার অনুমতি দিলে হবে)
                video.muted = false;
                
                // ফুলস্ক্রিন ও ল্যান্ডস্কেপ করার চেষ্টা
                const doc = document.documentElement;
                if (doc.requestFullscreen) await doc.requestFullscreen();
                
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (err) {
                // ব্রাউজার অনুমতি না দিলে এখানে কোনো এরর আসবে না, ভিডিও সাইলেন্টলি চলতে থাকবে
            }
        }

        function startPlayer() {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(STREAM_URL);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                    // পেজ লোড হওয়ার ২ সেকেন্ড পর অটো এক্সপেরিয়েন্সের চেষ্টা
                    setTimeout(attemptAutoExperience, 2000);
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = STREAM_URL;
                video.play().catch(() => {});
                setTimeout(attemptAutoExperience, 2000);
            }
        }

        startPlayer();
    </script>
</body>
</html>
