<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T Sports HD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; width: 100%; height: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; position: absolute; top: 0; left: 0; }
        #credit { position: fixed; bottom: 6px; right: 10px; color: rgba(255,255,255,0.25); font-family: Arial; font-size: 9px; z-index: 10; pointer-events: none; }
        #info { position: fixed; top: 6px; left: 10px; color: rgba(255,255,255,0.5); font-family: Arial; font-size: 9px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <video id="video" playsinline webkit-playsinline autoplay muted></video>
    <div id="credit">S.B Shehab</div>
    <div id="info"></div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const _k = 'aHR0cDovLzEwMy4xMy4xOTMuMTk0OjgwODIvVC1TUE9SVFMtSEQvdmlkZW8ubTN1OD90b2tlbj1SdXNyaVJNLUw3M0czMw==';
        const STREAM_URL = atob(_k);
        const video = document.getElementById('video');
        const info = document.getElementById('info');
        let hls = null, played = false;

        function goFull() {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            try { screen.orientation && screen.orientation.lock('landscape').catch(() => {}); } catch(e) {}
            video.muted = false;
            video.volume = 1.0;
        }

        function start() {
            if (typeof Hls === 'undefined') { setTimeout(start, 300); return; }

            if (Hls.isSupported()) {
                hls = new Hls({
                    // 🔥 রিয়েল-টাইম পারফরম্যান্স (সর্বোচ্চ)
                    liveSyncDurationCount: 1,
                    liveMaxLatencyDurationCount: 3,
                    lowLatencyMode: true,
                    
                    // বাফার কম = রিয়েল-টাইমের কাছাকাছি
                    maxBufferLength: 4,
                    maxMaxBufferLength: 8,
                    backBufferLength: 15,
                    maxBufferSize: 4 * 1000 * 1000,
                    maxBufferHole: 0.2,
                    
                    // হাই কোয়ালিটি - ফোর্স
                    startLevel: -1,
                    capLevelToPlayerSize: false,
                    autoStartLoad: true,
                    abrEwmaFastLive: 3.0,
                    abrEwmaSlowLive: 9.0,
                    
                    // কোয়ালিটি কমানোর আগে অনেক চেষ্টা করবে
                    fragLoadingTimeOut: 30000,
                    fragLoadingMaxRetry: 999,
                    fragLoadingRetryDelay: 500,
                    manifestLoadingTimeOut: 30000,
                    manifestLoadingMaxRetry: 999,
                    manifestLoadingRetryDelay: 500,
                    levelLoadingTimeOut: 30000,
                    levelLoadingMaxRetry: 999,
                    levelLoadingRetryDelay: 500,
                    
                    // ব্যান্ডউইথ এস্টিমেট হাই রাখবে
                    abrBandWidthFactor: 0.95,
                    abrBandWidthUpFactor: 0.5,
                    
                    // স্টল টলারেন্স মিনিমাম
                    highBufferWatchdogPeriod: 0,
                    progressive: true,
                    enableWorker: false,
                });

                hls.loadSource(STREAM_URL);
                hls.attachMedia(video);
                
                let lastStallTime = 0;
                let stallCount = 0;

                hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                    console.log('✅ Manifest loaded | Levels:', data.levels.length);
                    
                    if (data.levels.length > 0) {
                        const maxLevel = data.levels.length - 1;
                        hls.currentLevel = maxLevel;
                        console.log('🎯 MAX quality:', data.levels[maxLevel].height + 'p', '| Bitrate:', (data.levels[maxLevel].bitrate/1000000).toFixed(1) + 'Mbps');
                        info.textContent = data.levels[maxLevel].height + 'p ' + (data.levels[maxLevel].bitrate/1000000).toFixed(1) + 'Mbps';
                    }
                    
                    video.muted = true;
                    video.play().then(() => {
                        if (!played) { played = true; goFull(); }
                        setTimeout(() => { video.muted = false; }, 1000);
                    }).catch(() => {
                        setTimeout(() => {
                            video.muted = true;
                            video.play().then(() => {
                                if (!played) { played = true; goFull(); }
                                setTimeout(() => { video.muted = false; }, 1000);
                            }).catch(() => {});
                        }, 500);
                    });
                });

                // 🔥 কোয়ালিটি সুইচ ট্র্যাকিং
                hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
                    if (hls.levels[data.level]) {
                        const lvl = hls.levels[data.level];
                        console.log('📺 Quality:', lvl.height + 'p', '| Bitrate:', (lvl.bitrate/1000000).toFixed(1) + 'Mbps');
                        info.textContent = lvl.height + 'p ' + (lvl.bitrate/1000000).toFixed(1) + 'Mbps';
                    }
                });

                // 🔥 বাফার স্টল হলেই রিকভার
                let recovering = false;
                hls.on(Hls.Events.BUFFER_STALLED, () => {
                    console.log('⏸️ Buffer stalled - immediate recovery');
                    if (!recovering) {
                        recovering = true;
                        
                        // এখন যে কোয়ালিটি আছে তার এক লেভেল কম
                        const current = hls.currentLevel;
                        if (current > 0) {
                            hls.currentLevel = current - 1;
                            console.log('⬇️ Fast recovery: lowered to', hls.levels[hls.currentLevel].height + 'p');
                        }
                        
                        hls.recoverMediaError();
                        setTimeout(() => { recovering = false; }, 2000);
                    }
                });

                // 🔥 ভিডিও ইলিমেন্ট স্টল
                video.addEventListener('stalled', () => {
                    console.log('⏸️ Video stalled');
                    lastStallTime = Date.now();
                    stallCount++;
                    
                    // ২ সেকেন্ডে ২ বার স্টল = কোয়ালিটি কমাও
                    if (stallCount >= 2 && hls.currentLevel > 0) {
                        hls.currentLevel = hls.currentLevel - 1;
                        console.log('⬇️ Stall recovery: lowered to', hls.levels[hls.currentLevel].height + 'p');
                        stallCount = 0;
                    }
                    
                    video.play().catch(() => {});
                });
                
                video.addEventListener('playing', () => {
                    // স্টল কাউন্ট রিসেট
                    if (Date.now() - lastStallTime > 5000) {
                        stallCount = 0;
                    }
                    console.log('▶️ Playing');
                });

                // 🔥 নন-ফেটাল এরর ইগনোর, ফেটাল হলেই রিস্টার্ট
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.log('💀 Fatal:', data.type, data.details);
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            hls.startLoad();
                        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            hls.recoverMediaError();
                        } else {
                            hls.destroy();
                            setTimeout(start, 1000);
                        }
                    }
                });

                // 🔥 ২ মিনিট স্মুথ চললে অটো হাইয়েস্ট কোয়ালিটি আবার
                let smoothTime = 0;
                setInterval(() => {
                    if (!video.paused && video.readyState >= 3) {
                        smoothTime++;
                        if (smoothTime >= 120 && hls.currentLevel < hls.levels.length - 1) {
                            hls.currentLevel = hls.levels.length - 1;
                            console.log('⬆️ Smooth playback: MAX quality restored');
                            smoothTime = 0;
                        }
                    } else {
                        smoothTime = 0;
                    }
                }, 1000);

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = STREAM_URL;
                video.muted = true;
                video.addEventListener('loadedmetadata', () => {
                    video.play().then(() => {
                        if (!played) { played = true; goFull(); }
                        setTimeout(() => { video.muted = false; }, 1000);
                    }).catch(() => {});
                });
                video.addEventListener('stalled', () => {
                    video.load();
                    video.play().catch(() => {});
                });
            }
        }

        setTimeout(start, 500);

        document.addEventListener('click', goFull);
        document.addEventListener('touchstart', goFull);

        console.log('%c🔥 T Sports HD %c| %cRealtime Mode %c| %cS.B Shehab',
            'color:#e63946;font-weight:bold;font-size:14px;',
            'color:#fff;',
            'color:#ff6b6b;',
            'color:#fff;',
            'color:#f0c040;');
    </script>
</body>
</html>
