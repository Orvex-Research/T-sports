<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T Sports HD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; width: 100%; height: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; position: absolute; top: 0; left: 0; }
        #credit { position: fixed; bottom: 6px; right: 10px; color: rgba(255,255,255,0.25); font-family: Arial; font-size: 9px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <video id="video" playsinline webkit-playsinline autoplay muted></video>
    <div id="credit">S.B Shehab</div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const _k = 'aHR0cDovLzEwMy4xMy4xOTMuMTk0OjgwODIvVC1TUE9SVFMtSEQvdmlkZW8ubTN1OD90b2tlbj1SdXNyaVJNLUw3M0czMw==';
        const STREAM_URL = atob(_k);
        const video = document.getElementById('video');
        let hls = null;
        let clicked = false;
        let currentLevel = 0;
        let maxLevel = 0;
        let stallCount = 0;
        let lastStallTime = 0;
        let smoothTime = 0;

        function goFull() {
            if (clicked) return;
            clicked = true;
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            try { screen.orientation && screen.orientation.lock('landscape').catch(() => {}); } catch(e) {}
            video.muted = false;
            video.volume = 1.0;
        }

        function start() {
            if (typeof Hls === 'undefined') { setTimeout(start, 300); return; }

            if (Hls.isSupported()) {
                hls = new Hls({
                    autoStartLoad: true,
                    startLevel: -1,
                    capLevelToPlayerSize: false,
                    maxBufferLength: 20,
                    maxMaxBufferLength: 30,
                    fragLoadingTimeOut: 30000,
                    fragLoadingMaxRetry: 999,
                    manifestLoadingMaxRetry: 999,
                    levelLoadingTimeOut: 30000,
                    levelLoadingMaxRetry: 999,
                    abrBandWidthFactor: 0.9,
                    abrBandWidthUpFactor: 0.5,
                });

                hls.loadSource(STREAM_URL);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                    maxLevel = data.levels.length - 1;
                    currentLevel = maxLevel;
                    hls.currentLevel = currentLevel;
                    console.log('🎯 Quality:', data.levels[currentLevel].height + 'p');

                    video.play().catch(() => {
                        setTimeout(() => video.play().catch(() => {}), 500);
                    });
                });

                // ভিডিও স্টল = ইন্টারনেট প্রবলেম
                video.addEventListener('stalled', () => {
                    stallCount++;
                    lastStallTime = Date.now();
                    console.log('⏸️ Stall #' + stallCount);

                    if (stallCount >= 2 && currentLevel > 0) {
                        currentLevel--;
                        hls.currentLevel = currentLevel;
                        console.log('⬇️ Internet slow → Quality:', hls.levels[currentLevel].height + 'p');
                        stallCount = 0;
                    }

                    video.play().catch(() => {});
                });

                video.addEventListener('waiting', () => {
                    stallCount++;
                    if (stallCount >= 3 && currentLevel > 0) {
                        currentLevel--;
                        hls.currentLevel = currentLevel;
                        console.log('⬇️ Buffering → Quality:', hls.levels[currentLevel].height + 'p');
                        stallCount = 0;
                    }
                });

                video.addEventListener('playing', () => {
                    if (Date.now() - lastStallTime > 5000) {
                        stallCount = 0;
                    }
                    smoothTime++;
                    // ২ মিনিট স্মুথ = অটো হাই কোয়ালিটি
                    if (smoothTime >= 120 && currentLevel < maxLevel) {
                        currentLevel++;
                        hls.currentLevel = currentLevel;
                        console.log('⬆️ Internet good → Quality:', hls.levels[currentLevel].height + 'p');
                        smoothTime = 0;
                    }
                });

                hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
                    currentLevel = data.level;
                    console.log('📺 Quality:', hls.levels[currentLevel].height + 'p');
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            console.log('🔄 Network error, retry...');
                            hls.startLoad();
                            if (currentLevel > 0) {
                                currentLevel--;
                                hls.currentLevel = currentLevel;
                            }
                        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            hls.recoverMediaError();
                        } else {
                            hls.destroy();
                            setTimeout(start, 1000);
                        }
                    }
                });

                setInterval(() => {
                    if (video.paused) video.play().catch(() => {});
                }, 3000);

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = STREAM_URL;
                video.play().catch(() => {});
                video.addEventListener('stalled', () => {
                    video.load();
                    video.play().catch(() => {});
                });
                setInterval(() => {
                    if (video.paused) video.play().catch(() => {});
                }, 3000);
            }
        }

        setTimeout(start, 500);

        document.addEventListener('click', goFull);
        document.addEventListener('touchstart', goFull);
    </script>
</body>
</html>
