<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Sports HD Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            cursor: pointer;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* LIVE badge top-left */
        .live-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(6px);
            padding: 5px 12px;
            border-radius: 6px;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.4s;
        }
        .live-dot {
            width: 8px; height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .live-text {
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Watermark top-right */
        .watermark {
            position: absolute;
            top: 14px;
            right: 14px;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            pointer-events: none;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 6px;
            backdrop-filter: blur(4px);
        }

        /* Fullscreen hint bottom center (fades away) */
        .hint {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: rgba(255,255,255,0.75);
            padding: 9px 20px;
            border-radius: 30px;
            font-size: 13px;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.6s ease;
            white-space: nowrap;
        }

        /* Muted indicator (shows briefly then fades) */
        .muted-icon {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="video-container" id="container">

    <!-- LIVE badge -->
    <div class="live-badge">
        <div class="live-dot"></div>
        <div class="live-text">Live</div>
    </div>

    <!-- Watermark -->
    <div class="watermark">S.B shehab</div>

    <!-- Hint: tap to fullscreen -->
    <div class="hint" id="hint">Tap for Fullscreen</div>

    <!-- Muted info -->
    <div class="muted-icon" id="muted-icon">🔇 Tap to Unmute</div>

    <!-- Video element: autoplay muted (works in all browsers without click) -->
    <video id="video" autoplay muted playsinline></video>

</div>

<script>
    var video   = document.getElementById('video');
    var container = document.getElementById('container');
    var hint    = document.getElementById('hint');
    var mutedIcon = document.getElementById('muted-icon');
    var videoSrc = '/stream/T-SPORTS-HD/video.m3u8';
    var hls;

    /* ─── Player Init ─── */
    function initPlayer() {
        if (Hls.isSupported()) {
            hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                startLevel: -1 // will be overridden below
            });
            hls.loadSource(videoSrc);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_LOADED, function(event, data) {
                // Force highest level from start
                var topLevel = data.levels.length - 1;
                hls.startLevel = topLevel;
            });

            hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
                var topLevel = data.levels.length - 1;
                hls.autoLevelEnabled = false;
                hls.currentLevel = topLevel;
                hls.loadLevel   = topLevel;
                // Play immediately (muted = browser allows)
                video.play().catch(function(e){ console.log('autoplay err:', e); });
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                if (!data.fatal) return;
                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                    hls.startLoad();
                } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                    hls.recoverMediaError();
                } else {
                    hls.destroy();
                    setTimeout(initPlayer, 3000); // retry
                }
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari native HLS
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play().catch(function(e){ console.log('autoplay err:', e); });
            });
        }
    }

    /* ─── Always Keep Playing (no pause) ─── */
    video.addEventListener('pause', function() {
        // Only force re-play if it was unintentional (not in the middle of a seek)
        if (!video.seeking) {
            video.play().catch(function(e){ console.log('replay err:', e); });
        }
    });

    /* ─── 1-Click: Fullscreen Toggle ─── */
    container.addEventListener('click', function(e) {
        // If video is muted, unmute on first click
        if (video.muted) {
            video.muted = false;
        }

        toggleFullscreen();

        // Hide the hint after first click
        hint.style.opacity = '0';
    });

    function toggleFullscreen() {
        var isFs = document.fullscreenElement || document.webkitFullscreenElement
                 || document.mozFullScreenElement || document.msFullscreenElement;

        if (!isFs) {
            // Enter fullscreen
            var req = container.requestFullscreen || container.webkitRequestFullscreen
                    || container.mozRequestFullScreen || container.msRequestFullscreen;
            if (req) req.call(container);

            // Auto-rotate to landscape on mobile
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function(){});
            }
        } else {
            // Exit fullscreen
            var exit = document.exitFullscreen || document.webkitExitFullscreen
                     || document.mozCancelFullScreen || document.msExitFullscreen;
            if (exit) exit.call(document);
        }
    }

    /* ─── Show muted hint briefly on load ─── */
    window.addEventListener('DOMContentLoaded', function() {
        initPlayer();

        // Show muted icon for 3s then fade
        mutedIcon.style.display = 'block';
        setTimeout(function() {
            mutedIcon.style.transition = 'opacity 0.8s';
            mutedIcon.style.opacity = '0';
            setTimeout(function() { mutedIcon.style.display = 'none'; }, 800);
        }, 3000);

        // Fade hint after 5s
        setTimeout(function() {
            hint.style.opacity = '0.5';
        }, 5000);
    });
</script>

</body>
</html>
