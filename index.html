<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T Sports HD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; width: 100%; height: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; position: absolute; top: 0; left: 0; }
        #credit { position: fixed; bottom: 6px; right: 10px; color: rgba(255,255,255,0.25); font-family: Arial; font-size: 9px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <video id="video" playsinline webkit-playsinline autoplay muted></video>
    <div id="credit">S.B Shehab</div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const _k = 'aHR0cDovLzEwMy4xMy4xOTMuMTk0OjgwODIvVC1TUE9SVFMtSEQvdmlkZW8ubTN1OD90b2tlbj1SdXNyaVJNLUw3M0czMw==';
        const STREAM_URL = atob(_k);
        const video = document.getElementById('video');
        let hls = null, played = false, recoveryAttempts = 0;

        function goFull() {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            try { screen.orientation && screen.orientation.lock('landscape').catch(() => {}); } catch(e) {}
            video.muted = false;
            video.volume = 1.0;
        }

        function start() {
            if (typeof Hls === 'undefined') { setTimeout(start, 300); return; }

            if (Hls.isSupported()) {
                hls = new Hls({
                    // Performance
                    lowLatencyMode: false,
                    enableWorker: true,
                    
                    // Buffer - কম রাখলেই আটকাবে না
                    maxBufferLength: 10,
                    maxMaxBufferLength: 20,
                    backBufferLength: 30,
                    
                    // High Quality Force
                    startLevel: -1, // অটো সিলেক্ট (সর্বোচ্চ নেবে)
                    capLevelToPlayerSize: false, // প্লেয়ার সাইজ ইগনোর করে বেস্ট কোয়ালিটি
                    autoStartLoad: true,
                    
                    // Retry - আটকে গেলে দ্রুত রিকভারি
                    manifestLoadingTimeOut: 10000,
                    manifestLoadingMaxRetry: 999,
                    manifestLoadingRetryDelay: 1000,
                    levelLoadingTimeOut: 10000,
                    levelLoadingMaxRetry: 999,
                    levelLoadingRetryDelay: 1000,
                    fragLoadingTimeOut: 10000,
                    fragLoadingMaxRetry: 999,
                    fragLoadingRetryDelay: 1000,
                    
                    // Stall detection বন্ধ
                    highBufferWatchdogPeriod: 0,
                    
                    // Network error handling
                    progressive: true,
                });

                hls.loadSource(STREAM_URL);
                hls.attachMedia(video);

                // MANIFEST পেয়েছে = শুরু
                hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                    console.log('✅ Manifest loaded | Levels:', data.levels.length);
                    
                    // সর্বোচ্চ কোয়ালিটি সেট
                    if (data.levels.length > 0) {
                        const maxLevel = data.levels.length - 1;
                        hls.currentLevel = maxLevel;
                        console.log('🎯 Quality set to:', data.levels[maxLevel].height + 'p');
                    }
                    
                    // প্লে শুরু
                    video.muted = true;
                    const playPromise = video.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            if (!played) { played = true; goFull(); }
                            setTimeout(() => { video.muted = false; }, 800);
                        }).catch(() => {
                            // আবার ট্রাই
                            setTimeout(() => {
                                video.muted = true;
                                video.play().then(() => {
                                    if (!played) { played = true; goFull(); }
                                    setTimeout(() => { video.muted = false; }, 800);
                                }).catch(() => {});
                            }, 500);
                        });
                    }
                });

                // LEVEL SWITCHED = কোয়ালিটি চেঞ্জ হলে লগ
                hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
                    if (hls.levels[data.level]) {
                        console.log('📺 Quality:', hls.levels[data.level].height + 'p');
                    }
                });

                // ERROR HANDLE
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log('🔄 Network error, retry #' + recoveryAttempts);
                                recoveryAttempts++;
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.log('🔧 Media error, recovering...');
                                recoveryAttempts++;
                                hls.recoverMediaError();
                                break;
                            default:
                                console.log('💀 Fatal error, restarting...');
                                recoveryAttempts++;
                                if (recoveryAttempts < 10) {
                                    hls.destroy();
                                    setTimeout(start, 1000);
                                }
                                break;
                        }
                    } else {
                        // Non-fatal error = ignore
                        console.log('⚠️ Non-fatal error, continuing...');
                    }
                });

                // BUFFER STALLED = আটকে গেলে ফোর্স রিকভারি
                hls.on(Hls.Events.BUFFER_STALLED, () => {
                    console.log('⏸️ Buffer stalled, forcing recovery...');
                    hls.recoverMediaError();
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari Native
                video.src = STREAM_URL;
                video.muted = true;
                video.addEventListener('loadedmetadata', () => {
                    video.play().then(() => {
                        if (!played) { played = true; goFull(); }
                        setTimeout(() => { video.muted = false; }, 800);
                    }).catch(() => {});
                });
                video.addEventListener('stalled', () => {
                    video.load();
                    video.play().catch(() => {});
                });
            }
        }

        // Start with delay to ensure Hls.js loaded
        setTimeout(start, 500);

        // User interaction = Fullscreen + Sound
        document.addEventListener('click', goFull);
        document.addEventListener('touchstart', goFull);
        
        // ভিডিও আটকে গেলে অটো রিকভারি
        video.addEventListener('stalled', () => {
            console.log('⏸️ Video stalled, recovering...');
            if (hls) hls.recoverMediaError();
            video.play().catch(() => {});
        });
        
        video.addEventListener('waiting', () => {
            console.log('⏳ Video waiting...');
        });
        
        video.addEventListener('playing', () => {
            console.log('▶️ Video playing');
            recoveryAttempts = 0;
        });

        console.log('%c🚀 T Sports HD %c| %cS.B Shehab %c| HQ Ready',
            'color:#e63946;font-weight:bold;font-size:16px;',
            'color:#fff;',
            'color:#f0c040;',
            'color:#888;');
    </script>
</body>
</html>
