<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T Sports HD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; width: 100%; height: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; position: absolute; top: 0; left: 0; }
        #credit { position: fixed; bottom: 6px; right: 10px; color: rgba(255,255,255,0.25); font-family: Arial; font-size: 9px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <video id="video" playsinline webkit-playsinline autoplay></video>
    <div id="credit">S.B Shehab</div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const STREAM_URL = 'http://103.13.193.194:8082/T-SPORTS-HD/video.m3u8?token=RusriRM-L73G33';
        const video = document.getElementById('video');
        let hls = null;
        let clicked = false;

        function goFull() {
            if (clicked) return;
            clicked = true;
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            try { screen.orientation && screen.orientation.lock('landscape').catch(() => {}); } catch(e) {}
        }

        function start() {
            if (typeof Hls === 'undefined') { setTimeout(start, 300); return; }

            if (Hls.isSupported()) {
                hls = new Hls({
                    autoStartLoad: true,
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                    fragLoadingTimeOut: 20000,
                    fragLoadingMaxRetry: 999,
                    manifestLoadingMaxRetry: 999,
                });

                hls.loadSource(STREAM_URL);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.muted = false;
                    video.volume = 1.0;
                    video.play().catch(() => {});
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                        else { hls.destroy(); setTimeout(start, 1000); }
                    }
                });

                setInterval(() => { if (video.paused) video.play().catch(() => {}); }, 3000);

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = STREAM_URL;
                video.muted = false;
                video.volume = 1.0;
                video.play().catch(() => {});
            }
        }

        setTimeout(start, 500);
        document.addEventListener('click', goFull);
        document.addEventListener('touchstart', goFull, { passive: true });
    </script>
</body>
</html>
